<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Local Proxy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'SF Mono',Monaco,monospace;background:#111;color:#d4d4d4;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}
.toolbar{display:flex;gap:8px;padding:8px 12px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;align-items:center;flex-wrap:wrap}
.toolbar-routing{display:flex;gap:8px;padding:8px 12px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;align-items:center}
.toolbar input,.toolbar select{background:#252525;border:1px solid #3a3a3a;color:#d4d4d4;padding:4px 8px;border-radius:4px;font-family:inherit;font-size:12px}
.toolbar-routing input{background:#252525;border:1px solid #3a3a3a;color:#d4d4d4;padding:4px 8px;border-radius:4px;font-family:inherit;font-size:12px;width:220px}
.toolbar input{width:180px}
.toolbar input:focus,.toolbar select:focus{outline:none;border-color:#4a9eff}
/* upstream input wider */
#upstream-input{width:220px}
.btn{background:#252525;border:1px solid #3a3a3a;color:#d4d4d4;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:12px}
.btn:hover{background:#2f2f2f;border-color:#555}
.btn.danger{border-color:#5a2222;color:#ff6b6b}
.btn.danger:hover{background:#2a1111}
.btn.primary{border-color:#3a6aaa;color:#4a9eff}
.btn.primary:hover{background:#1a2a3a}
.btn.on{border-color:#4ec94e;color:#4ec94e;background:#0a1a0a}
.btn.on:hover{background:#0f2a0f}
#app-title{font-size:13px;font-weight:600;color:#c0c0c0;white-space:nowrap;flex-shrink:0}
.sep{width:1px;background:#2a2a2a;height:20px;flex-shrink:0}
.conn{margin-left:auto;font-size:11px;white-space:nowrap}
.conn.on{color:#4ec94e}
.conn.off{color:#ff6b6b}
.main{display:flex;flex:1;overflow:hidden;min-height:0}
.list-panel{width:300px;min-width:220px;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;overflow:hidden}
.list-head{padding:6px 12px;font-size:11px;color:#666;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:center;gap:6px}
.req-list{flex:1;overflow-y:auto}
.req-item{padding:8px 12px;border-bottom:1px solid #1e1e1e;cursor:pointer;user-select:none}
.req-item:hover{background:#1a1a1a}
.req-item.active{background:#1e2a3a}
.req-item .model{font-size:12px;font-weight:600;color:#e0e0e0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.req-item .meta{font-size:11px;color:#555;margin-top:2px;display:flex;gap:6px;align-items:center}
.badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600}
.badge.pending{background:#2a2a00;color:#cccc00}
.badge.streaming{background:#002a12;color:#33dd77;animation:pulse 1s infinite}
.badge.complete{background:#001a2a;color:#4499ff}
.badge.error{background:#2a0000;color:#ff5555}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.stats-bar{padding:5px 16px;font-size:11px;color:#666;border-top:1px solid #2a2a2a;background:#161616;display:flex;gap:16px;align-items:center;flex-shrink:0}
.stats-bar .s-label{color:#444}
.stats-bar .s-val{color:#888}
.stats-bar .s-anth{color:#c678dd}
.stats-bar .s-local{color:#4a9eff}
.stats-bar .s-openai{color:#10a37f}
.stats-bar .s-sep{color:#333}
.detail-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.empty{flex:1;display:flex;align-items:center;justify-content:center;color:#333;font-size:13px}
.tabs{display:flex;padding:0 12px;border-bottom:1px solid #2a2a2a;background:#161616;flex-shrink:0}
.tab{padding:8px 14px;cursor:pointer;font-size:12px;color:#666;border-bottom:2px solid transparent}
.tab:hover{color:#aaa}
.tab.active{color:#d4d4d4;border-bottom-color:#4a9eff}
.tab-body{flex:1;overflow-y:auto;padding:12px}
.pane{display:none}
.pane.active{display:block}
.pane-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:6px;min-height:20px}
.pane-hdr-left{flex:1;font-size:11px;color:#555}
.pane-actions{display:flex;gap:4px;flex-shrink:0}
.xbtn{font-size:10px;padding:2px 7px;background:#252525;border:1px solid #3a3a3a;color:#888;border-radius:3px;cursor:pointer;font-family:inherit}
.xbtn:hover{color:#d4d4d4;border-color:#555}
.xbtn.on{color:#4a9eff;border-color:#3a6aaa;background:#1a2a3a}
pre{background:#181818;border:1px solid #2a2a2a;padding:12px;border-radius:4px;font-size:12px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;line-height:1.6}
.stream-box{background:#181818;border:1px solid #2a2a2a;padding:12px;border-radius:4px;font-size:12px;min-height:80px;white-space:pre-wrap;word-break:break-all;line-height:1.5}
.stream-cursor{display:inline-block;width:8px;height:13px;background:#4a9eff;animation:blink .7s step-end infinite;vertical-align:text-bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.tok-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.tok-card{background:#181818;border:1px solid #2a2a2a;border-radius:4px;padding:14px;text-align:center}
.tok-card .val{font-size:28px;font-weight:700;color:#4a9eff}
.tok-card .lbl{font-size:11px;color:#555;margin-top:4px}
.tok-meta{font-size:12px;color:#666;line-height:1.8}
/* JSON syntax */
.j-k{color:#9cdcfe}.j-s{color:#ce9178}.j-n{color:#b5cea8}.j-b{color:#569cd6}.j-nl{color:#569cd6}.j-idx{color:#555;font-size:11px}
/* collapsible tree */
.j-tree{background:#181818;border:1px solid #2a2a2a;padding:12px;border-radius:4px;font-size:12px;line-height:1.7}
.j-tree>div,.j-children>div{white-space:nowrap}
.j-tree div.j-multiline{white-space:normal}
.j-s-ml{white-space:pre-wrap;word-break:break-word;display:inline-block;vertical-align:top;max-width:100%}
.j-toggle{display:inline-block;width:14px;text-align:center;font-size:10px;color:#555;cursor:pointer;user-select:none}
.j-toggle:hover{color:#aaa}
.j-summary{color:#555;font-size:11px;font-style:italic;cursor:pointer}
.j-summary:hover{color:#888}
.j-children{padding-left:20px;border-left:1px solid #222}
.sse-block{margin:4px 0 8px;padding:4px 8px;border-left:2px solid #3a3a3a}
.sse-event{color:#4ec9b0;font-size:11px;margin-bottom:2px;font-style:italic}
.sse-data-raw{color:#ce9178;white-space:pre-wrap;word-break:break-word}
.j-tree-inline{background:transparent!important;border:none!important;padding:2px 0!important;border-radius:0!important;margin:0}
</style>
</head>
<body>
<div class="toolbar">
  <span id="app-title">Local LLM Proxy <span id="app-version" style="font-size:10px;color:#444"></span></span>
  <div class="sep"></div>
  <input id="q" type="text" placeholder="Search messages...">
  <select id="mf"><option value="">All models</option></select>
  <select id="sf">
    <option value="">All status</option>
    <option value="complete">Complete</option>
    <option value="streaming">Streaming</option>
    <option value="error">Error</option>
    <option value="pending">Pending</option>
  </select>
  <div class="sep"></div>
  <button class="btn" onclick="doExport('json')">Export JSON</button>
  <button class="btn" onclick="doExport('csv')">Export CSV</button>
  <span id="cs" class="conn off" style="margin-left:auto">&#9679; Disconnected</span>
</div>
<div class="toolbar-routing">
  <button class="btn" id="btn-auto" onclick="setMode('auto')">Auto Routing</button>
  <button class="btn" id="btn-local" onclick="setMode('local')">Local LLM</button>
  <input id="upstream-input" type="text" placeholder="Local LLM URL">
  <button class="btn primary" onclick="setUpstream()">Set</button>
</div>
<div class="main">
  <div class="list-panel">
    <div class="list-head">
      <span id="rc">0 requests</span>
      <div style="display:flex;gap:4px;flex-shrink:0">
        <button class="btn on" id="btn-autoscroll" onclick="toggleAutoScroll()" style="font-size:11px;padding:2px 6px">Auto Scroll</button>
        <button class="btn danger" onclick="doClear()" style="font-size:11px;padding:2px 6px">Clear</button>
      </div>
    </div>
    <div class="req-list" id="rl"></div>
  </div>
  <div class="detail-panel" id="dp">
    <div class="empty">Select a request to inspect</div>
  </div>
</div>
<div class="stats-bar" id="sb"></div>
<script>
const records = {};
const streaming = {};
let sel = null;
let prettyMode = true;
let autoScroll = true;

function toggleAutoScroll() {
  autoScroll = !autoScroll;
  document.getElementById('btn-autoscroll').classList.toggle('on', autoScroll);
}

// ── helpers ───────────────────────────────────────────────────────────────────

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(ts) {
  return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function fmtDuration(ms) {
  if (ms < 1000) return ms + 'ms';
  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
  const m = Math.floor(ms / 60000);
  const s = ((ms % 60000) / 1000).toFixed(0);
  return m + 'm ' + s + 's';
}

function extractTextFromSse(sseString) {
  let out = '';
  for (const line of sseString.split('\n')) {
    if (!line.startsWith('data: ') || line === 'data: [DONE]') continue;
    try {
      const j = JSON.parse(line.slice(6));
      if (j.choices?.[0]?.delta?.content) out += j.choices[0].delta.content;
      else if (j.delta?.text) out += j.delta.text;
      else if (j.type === 'content_block_delta' && j.delta?.text) out += j.delta.text;
    } catch {}
  }
  return out;
}

function extractText(chunk) {
  let out = '';
  for (const line of chunk.split('\n')) {
    if (!line.startsWith('data: ') || line === 'data: [DONE]') continue;
    try {
      const j = JSON.parse(line.slice(6));
      if (j.choices?.[0]?.delta?.content) out += j.choices[0].delta.content;
      else if (j.delta?.text) out += j.delta.text;
      else if (j.type === 'content_block_delta' && j.delta?.text) out += j.delta.text;
    } catch {}
  }
  return out;
}

// Reconstruct extracted text from stored chunks (for historical records)
function getStreamedText(r) {
  if (streaming[r.id]) return streaming[r.id];
  if (!r.chunks || r.chunks.length === 0) return '';
  if (r.method === 'WS') return r.chunks.join('');
  return r.chunks.map(c => extractText(c)).join('');
}

// Extract user message from an OpenAI Responses API request object
function extractInputText(req) {
  if (!req) return '';
  const input = req.input || req.messages;
  if (!Array.isArray(input)) return '';
  const parts = [];
  for (const item of input) {
    if (item.role === 'user' && item.content) {
      if (typeof item.content === 'string') { parts.push(item.content); continue; }
      if (Array.isArray(item.content)) {
        for (const c of item.content) {
          if (c.text || c.input_text) parts.push(c.text || c.input_text);
        }
      }
    }
  }
  return parts.join('\n');
}

// Extract human-readable output text from an OpenAI Responses API object
function extractOutputText(resp) {
  if (!resp || !resp.output) return '';
  const parts = [];
  for (const item of resp.output) {
    if (item.content) {
      for (const c of item.content) {
        if (c.text) parts.push(c.text);
      }
    }
    if (item.type === 'message' && item.content) {
      for (const c of item.content) {
        if (c.text) parts.push(c.text);
      }
    }
  }
  return parts.join('\n');
}

// ── SSE / inline-JSON rendering ───────────────────────────────────────────────

function isSse(str) {
  return /^(event:|data:)\s/m.test(str);
}

function renderSseInto(container, str) {
  const blocks = [];
  let current = null;
  for (const line of str.split('\n')) {
    if (line.startsWith('event:')) {
      if (current) blocks.push(current);
      current = { event: line.slice(6).trim(), data: null };
    } else if (line.startsWith('data:')) {
      const raw = line.slice(5).trim();
      if (!current) current = { event: null, data: raw };
      else current.data = raw;
    } else if (line.trim() === '' && current) {
      blocks.push(current);
      current = null;
    }
  }
  if (current) blocks.push(current);

  for (const block of blocks) {
    const blockEl = document.createElement('div');
    blockEl.className = 'sse-block';
    if (block.event) {
      const evEl = document.createElement('div');
      evEl.className = 'sse-event';
      evEl.textContent = 'event: ' + block.event;
      blockEl.appendChild(evEl);
    }
    if (block.data) {
      try {
        const parsed = JSON.parse(block.data);
        const jsonWrap = document.createElement('div');
        jsonWrap.className = 'j-tree j-tree-inline';
        renderNodeInto(jsonWrap, parsed, null, 0);
        blockEl.appendChild(jsonWrap);
      } catch {
        const dataEl = document.createElement('div');
        dataEl.className = 'sse-data-raw';
        dataEl.textContent = 'data: ' + block.data;
        blockEl.appendChild(dataEl);
      }
    }
    container.appendChild(blockEl);
  }
}

// ── collapsible JSON tree ─────────────────────────────────────────────────────

function renderNodeInto(parent, data, key, depth) {
  if (depth === undefined) depth = 0;
  const row = document.createElement('div');

  let keyEl = null;
  if (key !== null) {
    keyEl = document.createElement('span');
    if (typeof key === 'number') { keyEl.className = 'j-idx'; keyEl.textContent = key; }
    else { keyEl.className = 'j-k'; keyEl.textContent = JSON.stringify(key); }
    row.appendChild(keyEl);
    row.appendChild(document.createTextNode(': '));
  }

  // primitives
  if (data === null || typeof data !== 'object') {
    if (typeof data === 'string' && (data.includes('\n') || data.length > 120)) {
      row.classList.add('j-multiline');
      const trimmed = data.trim();
      if (isSse(data)) {
        // SSE stream — render structured blocks
        renderSseInto(row, data);
      } else if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
        // looks like embedded JSON — try to parse and render as tree
        try {
          const parsed = JSON.parse(trimmed);
          const jsonWrap = document.createElement('div');
          jsonWrap.className = 'j-tree j-tree-inline';
          renderNodeInto(jsonWrap, parsed, null, 0);
          row.appendChild(jsonWrap);
        } catch {
          const v = document.createElement('span');
          v.className = 'j-s j-s-ml';
          v.textContent = '"' + data + '"';
          row.appendChild(v);
        }
      } else {
        const v = document.createElement('span');
        v.className = 'j-s j-s-ml';
        v.textContent = '"' + data + '"';
        row.appendChild(v);
      }
    } else {
      const v = document.createElement('span');
      v.className = data === null ? 'j-nl' : typeof data === 'boolean' ? 'j-b' : typeof data === 'number' ? 'j-n' : 'j-s';
      v.textContent = JSON.stringify(data);
      row.appendChild(v);
    }
    parent.appendChild(row);
    return;
  }

  const isArr = Array.isArray(data);
  const count = isArr ? data.length : Object.keys(data).length;
  const [o, c] = isArr ? ['[', ']'] : ['{', '}'];

  if (count === 0) {
    row.appendChild(Object.assign(document.createElement('span'), {textContent: o + c}));
    parent.appendChild(row);
    return;
  }

  const startExpanded = depth === 0;

  const toggle = document.createElement('span');
  toggle.className = 'j-toggle';
  toggle.textContent = startExpanded ? '▾' : '▸';
  row.insertBefore(toggle, row.firstChild);

  row.appendChild(Object.assign(document.createElement('span'), {textContent: o}));

  const nameHint = (!isArr && data.name && typeof data.name === 'string' && data.name.length <= 40)
    ? ` "${data.name}" —` : '';
  const summary = Object.assign(document.createElement('span'), {
    className: 'j-summary',
    textContent: isArr ? ` [${count} items]` : `${nameHint} {${count} keys}`,
  });
  summary.style.display = startExpanded ? 'none' : '';
  row.appendChild(summary);

  const closeInline = Object.assign(document.createElement('span'), {textContent: c});
  closeInline.style.display = startExpanded ? 'none' : '';
  row.appendChild(closeInline);

  parent.appendChild(row);

  const kids = document.createElement('div');
  kids.className = 'j-children';
  kids.style.display = startExpanded ? '' : 'none';
  if (isArr) data.forEach((item, i) => renderNodeInto(kids, item, i, depth + 1));
  else Object.entries(data).forEach(([k, v]) => renderNodeInto(kids, v, k, depth + 1));
  parent.appendChild(kids);

  const closeRow = document.createElement('div');
  closeRow.style.display = startExpanded ? '' : 'none';
  closeRow.appendChild(Object.assign(document.createElement('span'), {textContent: c}));
  parent.appendChild(closeRow);

  let isCollapsed = !startExpanded;

  const doToggle = e => {
    e.stopPropagation();
    isCollapsed = !isCollapsed;
    toggle.textContent = isCollapsed ? '▸' : '▾';
    kids.style.display = isCollapsed ? 'none' : '';
    closeRow.style.display = isCollapsed ? 'none' : '';
    summary.style.display = isCollapsed ? '' : 'none';
    closeInline.style.display = isCollapsed ? '' : 'none';
  };
  toggle.addEventListener('click', doToggle);
  summary.addEventListener('click', doToggle);
  if (keyEl) { keyEl.style.cursor = 'pointer'; keyEl.addEventListener('click', doToggle); }
}

function buildJsonTree(container, data) {
  container.innerHTML = '';
  const pre = document.createElement('pre');
  pre.className = 'j-tree';
  try {
    const obj = typeof data === 'string' ? JSON.parse(data) : data;
    if (obj == null) { pre.textContent = String(data); container.appendChild(pre); return; }
    renderNodeInto(pre, obj, null);
  } catch {
    pre.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
  }
  container.appendChild(pre);
}

function expandAll(containerId) {
  document.querySelectorAll(`#${containerId} .j-toggle`).forEach(t => {
    if (t.textContent === '▸') t.click();
  });
}

function collapseAll(containerId) {
  document.querySelectorAll(`#${containerId} .j-toggle`).forEach(t => {
    if (t.textContent === '▾') t.click();
  });
}

// fill JSON containers after renderDetail sets innerHTML
function populateJsonTrees(r) {
  const isLive = r.status === 'pending' || r.status === 'streaming';

  // request text summary (user message)
  const reqSummaryEl = document.getElementById('request-text-summary');
  if (reqSummaryEl) {
    const inputText = extractInputText(r.request);
    if (inputText) {
      reqSummaryEl.innerHTML = `<pre style="margin-bottom:12px;border-color:#2a3a5a;background:#0a0a1a;color:#b0c0e0;white-space:pre-wrap;word-break:break-word">${esc(inputText)}</pre>`;
    }
  }

  // request pane
  const reqEl = document.getElementById('json-request');
  if (reqEl) {
    if (prettyMode) buildJsonTree(reqEl, r.request);
    else reqEl.innerHTML = `<pre>${esc(JSON.stringify(r.request, null, 2))}</pre>`;
  }

  // response text summary + response body
  const summaryEl = document.getElementById('response-text-summary');
  const resEl = document.getElementById('json-response');
  if (!isLive && r.status !== 'error') {
    const streamText = getStreamedText(r);
    const outputText = r.response ? extractOutputText(r.response) : '';
    const sseText = (!streamText && !outputText && typeof r.response === 'string' && isSse(r.response)) ? extractTextFromSse(r.response) : '';
    const displayText = streamText || outputText || sseText;

    // text summary at top
    if (summaryEl && displayText) {
      summaryEl.innerHTML = `<pre style="margin-bottom:12px;border-color:#2a4a2a;background:#0a1a0a;color:#b0d0b0;white-space:pre-wrap;word-break:break-word">${esc(displayText)}</pre>`;
    }

    // JSON tree below
    if (resEl) {
      if (r.response && typeof r.response === 'object') {
        if (prettyMode) buildJsonTree(resEl, r.response);
        else resEl.innerHTML = `<pre>${esc(JSON.stringify(r.response, null, 2))}</pre>`;
      } else if (typeof r.response === 'string' && isSse(r.response)) {
        // Parse SSE events into array of objects for JSON tree
        const events = [];
        for (const line of r.response.split('\n')) {
          if (!line.startsWith('data: ') || line === 'data: [DONE]') continue;
          try { events.push(JSON.parse(line.slice(6))); } catch {}
        }
        if (events.length) {
          if (prettyMode) buildJsonTree(resEl, events);
          else resEl.innerHTML = `<pre>${esc(JSON.stringify(events, null, 2))}</pre>`;
        }
      }
    }
  }

  // raw pane — always full JSON
  const rawEl = document.getElementById('json-raw');
  if (rawEl) {
    const rawData = {request: r.request, response: r.response, chunks: r.chunks, usage: r.usage};
    if (prettyMode) buildJsonTree(rawEl, rawData);
    else rawEl.innerHTML = `<pre>${esc(JSON.stringify(rawData, null, 2))}</pre>`;
  }
}

function togglePretty() {
  prettyMode = !prettyMode;
  if (sel) renderDetail(records[sel]);
}

// ── list ──────────────────────────────────────────────────────────────────────

function filteredRecords() {
  const q = document.getElementById('q').value.toLowerCase();
  const mf = document.getElementById('mf').value;
  const sf = document.getElementById('sf').value;
  return Object.values(records)
    .filter(r => !mf || r.model === mf)
    .filter(r => !sf || r.status === sf)
    .filter(r => !q || JSON.stringify(r.request).toLowerCase().includes(q) || JSON.stringify(r.response||'').toLowerCase().includes(q))
    .sort((a,b) => b.timestamp.localeCompare(a.timestamp));
}

function renderList() {
  const fr = filteredRecords();
  document.getElementById('rl').innerHTML = fr.map(r => `
    <div class="req-item${r.id===sel?' active':''}" onclick="pick('${r.id}')">
      <div class="model">${esc(r.model)}</div>
      <div class="meta">
        <span class="badge ${r.status}">${r.status}</span>
        <span>${fmt(r.timestamp)}</span>
        <span>${r.durationMs != null ? r.durationMs+'ms' : '&hellip;'}</span>
        <span>${r.usage?.totalTokens||0}t</span>
      </div>
    </div>`).join('');
  document.getElementById('rc').textContent = `${fr.length} requests`;
  if (autoScroll && sel) {
    const activeEl = document.querySelector('#rl .req-item.active');
    if (activeEl) activeEl.scrollIntoView({block:'nearest'});
  }

  const mf = document.getElementById('mf');
  const cur = mf.value;
  const models = [...new Set(Object.values(records).map(r=>r.model))].filter(Boolean);
  mf.innerHTML = '<option value="">All models</option>' + models.map(m=>`<option${m===cur?' selected':''}>${esc(m)}</option>`).join('');

  updateStats();
}

function updateStats() {
  const all = Object.values(records);
  const isAnthropic = r => r.upstream && r.upstream.includes('api.anthropic.com');
  const isOpenAI    = r => r.upstream && (r.upstream.includes('api.openai.com') || r.upstream.includes('chatgpt.com'));
  const anth  = all.filter(isAnthropic);
  const oai   = all.filter(r => !isAnthropic(r) && isOpenAI(r));
  const local = all.filter(r => !isAnthropic(r) && !isOpenAI(r));
  const sum = (arr, f) => arr.reduce((s,r)=>s+(r.usage?.[f]||0),0);
  const n = v => v.toLocaleString();
  let html = `<span class="s-val">${all.length} requests</span>`;
  if (sum(anth,'inputTokens') || sum(anth,'outputTokens')) {
    html += `<span class="s-sep">&nbsp;·&nbsp;</span><span class="s-anth">Anthropic</span>`
          + `<span class="s-label"> in </span><span class="s-val">${n(sum(anth,'inputTokens'))}</span>`
          + `<span class="s-label"> out </span><span class="s-val">${n(sum(anth,'outputTokens'))}</span>`;
  }
  if (sum(oai,'inputTokens') || sum(oai,'outputTokens')) {
    html += `<span class="s-sep">&nbsp;·&nbsp;</span><span class="s-openai">OpenAI</span>`
          + `<span class="s-label"> in </span><span class="s-val">${n(sum(oai,'inputTokens'))}</span>`
          + `<span class="s-label"> out </span><span class="s-val">${n(sum(oai,'outputTokens'))}</span>`;
  }
  if (sum(local,'inputTokens') || sum(local,'outputTokens')) {
    html += `<span class="s-sep">&nbsp;·&nbsp;</span><span class="s-local">Local</span>`
          + `<span class="s-label"> in </span><span class="s-val">${n(sum(local,'inputTokens'))}</span>`
          + `<span class="s-label"> out </span><span class="s-val">${n(sum(local,'outputTokens'))}</span>`;
  }
  document.getElementById('sb').innerHTML = html;
}

// ── detail ────────────────────────────────────────────────────────────────────

function pick(id) {
  sel = id;
  renderList();
  renderDetail(records[id]);
}

function activeTab() {
  return document.querySelector('#dp .tab.active')?.dataset.tab || 'response';
}

function renderDetail(r) {
  const tab = activeTab();
  const isLive = r.status === 'pending' || r.status === 'streaming';
  const liveContent = streaming[r.id] || '';

  // pane action buttons
  const tb = `<button class="xbtn${prettyMode?' on':''}" onclick="togglePretty()">${prettyMode?'Raw':'Pretty'}</button>`;
  const reqBtns = `${tb}<button class="xbtn" onclick="expandAll('json-request')">+All</button><button class="xbtn" onclick="collapseAll('json-request')">&minus;All</button>`;
  const resBtns = `${tb}<button class="xbtn" onclick="expandAll('json-response')">+All</button><button class="xbtn" onclick="collapseAll('json-response')">&minus;All</button>`;
  const rawBtns = `${tb}<button class="xbtn" onclick="expandAll('json-raw')">+All</button><button class="xbtn" onclick="collapseAll('json-raw')">&minus;All</button><button class="xbtn" onclick="copyRaw()">Copy</button>`;

  const dp = document.getElementById('dp');
  dp.innerHTML = `
    <div class="tabs">
      <div class="tab${tab==='request'?' active':''}" data-tab="request" onclick="switchTab('request')">Request</div>
      <div class="tab${tab==='response'?' active':''}" data-tab="response" onclick="switchTab('response')">Response</div>
      <div class="tab${tab==='tokens'?' active':''}" data-tab="tokens" onclick="switchTab('tokens')">Tokens</div>
      <div class="tab${tab==='raw'?' active':''}" data-tab="raw" onclick="switchTab('raw')">Raw</div>
    </div>
    <div class="tab-body">

      <div id="pane-request" class="pane${tab==='request'?' active':''}">
        <div id="request-text-summary"></div>
        <div class="pane-hdr">
          <span class="pane-hdr-left">${esc(r.method)} ${esc(r.path)} &middot; ${fmt(r.timestamp)}</span>
          <div class="pane-actions">${reqBtns}</div>
        </div>
        <div id="json-request"></div>
      </div>

      <div id="pane-response" class="pane${tab==='response'?' active':''}">
        ${isLive
          ? `<div class="stream-box" id="sb-live">${esc(liveContent)}<span class="stream-cursor"></span></div>`
          : r.status === 'error'
            ? `<pre style="color:#ff5555">${esc(r.error||'Unknown error')}</pre>`
            : `<div id="response-text-summary"></div>
               <div class="pane-hdr">
                <span class="pane-hdr-left"></span>
                <div class="pane-actions">${(r.response && typeof r.response === 'object') || (typeof r.response === 'string' && isSse(r.response)) ? resBtns : tb}</div>
               </div>
               <div id="json-response"></div>`
        }
      </div>

      <div id="pane-tokens" class="pane${tab==='tokens'?' active':''}">
        <div class="tok-grid">
          <div class="tok-card"><div class="val">${r.usage?.inputTokens||0}</div><div class="lbl">Input Tokens</div></div>
          <div class="tok-card"><div class="val">${r.usage?.outputTokens||0}</div><div class="lbl">Output Tokens</div></div>
          <div class="tok-card"><div class="val">${r.usage?.totalTokens||0}</div><div class="lbl">Total Tokens</div></div>
        </div>
        <div class="tok-meta">
          Model: ${esc(r.model)}<br>
          Duration: ${r.durationMs != null ? fmtDuration(r.durationMs) : 'in progress'}<br>
          Status: ${r.status}<br>
          Time: ${new Date(r.timestamp).toLocaleString()}
        </div>
      </div>

      <div id="pane-raw" class="pane${tab==='raw'?' active':''}">
        <div class="pane-hdr">
          <span class="pane-hdr-left"></span>
          <div class="pane-actions">${rawBtns}</div>
        </div>
        <div id="json-raw"></div>
      </div>

    </div>`;

  populateJsonTrees(r);
}

function updateLive() {
  const el = document.getElementById('sb-live');
  if (el && sel) {
    el.innerHTML = esc(streaming[sel]||'') + '<span class="stream-cursor"></span>';
  }
}

function switchTab(tab) {
  document.querySelectorAll('#dp .tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('#dp .pane').forEach(p=>p.classList.toggle('active',p.id===`pane-${tab}`));
}

function copyRaw() {
  if (!sel) return;
  const r = records[sel];
  navigator.clipboard.writeText(JSON.stringify(
    {request: r.request, response: r.response, chunks: r.chunks, usage: r.usage}, null, 2
  )).catch(()=>{});
}

// ── upstream / mode switcher ──────────────────────────────────────────────────

function applyConfig(cfg) {
  if (cfg.upstreamUrl) document.getElementById('upstream-input').value = cfg.upstreamUrl;
  const input = document.getElementById('upstream-input');
  input.disabled = cfg.mode === 'anthropic';
  input.style.opacity = cfg.mode === 'anthropic' ? '0.35' : '';
  document.getElementById('btn-auto').classList.toggle('on', cfg.mode === 'auto');
  document.getElementById('btn-local').classList.toggle('on', cfg.mode === 'local');
}

function putConfig(body) {
  return fetch('/api/config', {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body),
  })
    .then(r => r.json().then(d => ({ ok: r.ok, status: r.status, d })))
    .then(({ ok, status, d }) => {
      if (!ok) { alert(d.error || `Server error ${status}`); return; }
      applyConfig(d);
      const input = document.getElementById('upstream-input');
      input.style.borderColor = '#4ec94e';
      setTimeout(() => input.style.borderColor = '', 1500);
    })
    .catch(err => alert('Failed: ' + err.message));
}

function setUpstream() {
  const val = document.getElementById('upstream-input').value.trim();
  if (!val) return;
  putConfig({ mode: 'local', upstreamUrl: val });
}

function setMode(mode) {
  // 'anthropic' only changes the mode — upstreamUrl is preserved as the local LLM URL
  putConfig({ mode });
}

document.getElementById('upstream-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') setUpstream();
});
// ── actions ───────────────────────────────────────────────────────────────────

function doExport(fmt) {
  const q = document.getElementById('q').value;
  const mf = document.getElementById('mf').value;
  const sf = document.getElementById('sf').value;
  const p = new URLSearchParams({format:fmt});
  if (q) p.set('search',q);
  if (mf) p.set('model',mf);
  if (sf) p.set('status',sf);
  window.location.href = `/api/export?${p}`;
}

function doClear() {
  if (!confirm('Clear all request history?')) return;
  fetch('/api/requests',{method:'DELETE'}).then(()=>{
    Object.keys(records).forEach(k=>delete records[k]);
    Object.keys(streaming).forEach(k=>delete streaming[k]);
    sel = null;
    renderList();
    document.getElementById('dp').innerHTML = '<div class="empty">Select a request to inspect</div>';
  });
}

// ── SSE ───────────────────────────────────────────────────────────────────────

let es;
function connect() {
  if (es) es.close();
  es = new EventSource('/events');
  es.onopen = () => {
    document.getElementById('cs').textContent = '\u25cf Connected';
    document.getElementById('cs').className = 'conn on';
  };
  es.onerror = () => {
    document.getElementById('cs').textContent = '\u25cf Disconnected';
    document.getElementById('cs').className = 'conn off';
    setTimeout(connect, 3000);
  };

  es.addEventListener('request:start', e => {
    const r = JSON.parse(e.data);
    records[r.id] = r;
    streaming[r.id] = '';
    if (autoScroll) {
      sel = r.id;
      renderList();
      renderDetail(r);
    } else {
      renderList();
    }
  });

  es.addEventListener('request:chunk', e => {
    const {id, chunk} = JSON.parse(e.data);
    if (records[id]) records[id].status = 'streaming';
    // WS chunks are plain text deltas; SSE chunks need extractText()
    const isWs = records[id]?.method === 'WS';
    streaming[id] = (streaming[id]||'') + (isWs ? chunk : extractText(chunk));
    if (sel === id) updateLive();
    else renderList();
  });

  es.addEventListener('request:complete', e => {
    const r = JSON.parse(e.data);
    records[r.id] = r;
    renderList();
    if (sel === r.id) renderDetail(r);
  });

  es.addEventListener('request:error', e => {
    const r = JSON.parse(e.data);
    records[r.id] = r;
    renderList();
    if (sel === r.id) renderDetail(r);
  });
}

// ── boot ──────────────────────────────────────────────────────────────────────

['q','mf','sf'].forEach(id => document.getElementById(id).addEventListener('input', renderList));
document.getElementById('sf').addEventListener('change', renderList);

// load version
fetch('/api/version').then(r=>r.json()).then(d => {
  document.getElementById('app-version').textContent = 'v' + d.version;
});

// load current config (mode + upstream)
fetch('/api/config').then(r=>r.json()).then(applyConfig);

// load history; reconstruct streaming text from stored chunks
fetch('/api/requests')
  .then(r=>r.json())
  .then(data => {
    data.forEach(r => {
      records[r.id] = r;
      const isWs = r.method === 'WS';
    streaming[r.id] = isWs ? (r.chunks || []).join('') : (r.chunks || []).map(c => extractText(c)).join('');
    });
    renderList();
  });

connect();
</script>
